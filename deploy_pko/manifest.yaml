apiVersion: manifests.package-operator.run/v1alpha1
kind: PackageManifest
metadata:
  name: certman-operator
spec:
  scopes:
  - Cluster
  phases:
  - name: crds
  - name: namespace
  - name: rbac
  - name: deploy
  - name: cleanup-rbac
  - name: cleanup-deploy
  availabilityProbes:
  - probes:
    - condition:
        type: Available
        status: 'True'
    - fieldsEqual:
        fieldA: .status.updatedReplicas
        fieldB: .status.replicas
    selector:
      kind:
        group: apps
        kind: Deployment
  config:
    openAPIV3Schema:
      type: object
      properties:
        image:
          description: Operator image to deploy
          type: string
          default: None
        fedramp:
          description: Whether the operator runs in a FedRAMP environment
          type: string
          default: "false"
          enum:
            - "true"
            - "false"
        hostedZoneId:
          description: Route53 hosted zone ID for FedRAMP DNS operations
          type: string
          default: ""
