apiVersion: manifests.package-operator.run/v1alpha1
kind: PackageManifest
metadata:
  name: certman-operator
spec:
  scopes:
  - Cluster
  phases:
  - name: crds
  - name: namespace
  - name: rbac
  - name: deploy
  - name: cleanup-rbac
  - name: cleanup-deploy
  availabilityProbes:
  - probes:
    - condition:
        type: Available
        status: 'True'
    - fieldsEqual:
        fieldA: .status.updatedReplicas
        fieldB: .status.replicas
    selector:
      kind:
        group: apps
        kind: Deployment
  config:
    openAPIV3Schema:
      type: object
      properties:
        image:
          description: Operator image to deploy
          type: string
          default: None
        fedramp:
          description: Enable FedRAMP mode
          type: string
          default: "false"
          enum:
          - "true"
          - "false"
        hosted_zone_id:
          description: Hosted zone ID for FedRAMP DNS operations
          type: string
          default: ""
test:
  template:
  - name: default
    context:
      package:
        metadata:
          name: certman-operator
          namespace: certman-operator
      config:
        image: certman-operator:latest
  - name: fedramp
    context:
      package:
        metadata:
          name: certman-operator
          namespace: certman-operator
      config:
        image: certman-operator:latest
        fedramp: "true"
        hosted_zone_id: Z0123456789ABCDEFGHIJ
