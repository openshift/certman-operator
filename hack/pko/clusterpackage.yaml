apiVersion: v1
kind: Template
parameters:
  - name: CHANNEL
    required: false
  - name: PKO_IMAGE
    required: true
  - name: OPERATOR_IMAGE
    required: true
  - name: IMAGE_TAG
    required: true
  - name: REPO_NAME
    value: certman-operator
    required: true
  - name: FEDRAMP
    value: "false"
  - name: HOSTED_ZONE_ID
    value: ""
metadata:
  name: clusterpackage-template
objects:
  - apiVersion: package-operator.run/v1alpha1
    kind: ClusterPackage
    metadata:
      name: "${REPO_NAME}"
      annotations:
        package-operator.run/collision-protection: IfNoController
    spec:
      image: ${PKO_IMAGE}:${IMAGE_TAG}
      config:
        image: ${OPERATOR_IMAGE}:${IMAGE_TAG}
        fedramp: "${FEDRAMP}"
        hostedZoneId: "${HOSTED_ZONE_ID}"
